<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–g:  #00ff41;
–gd: #00bb30;
–gf: #001a05;
–gm: #00cc33;
–bg: #010b01;
–cy: #00ffff;
–yl: #ffdd57;
}

html, body {
width: 100%; height: 100%;
background: var(–bg);
color: var(–g);
font-family: ‘Share Tech Mono’, ‘Courier New’, Courier, monospace;
overflow: hidden;
}

body::before {
content: ‘’;
position: fixed; inset: 0;
background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
pointer-events: none;
z-index: 200;
}

body::after {
content: ‘’;
position: fixed; inset: 0;
background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.6) 100%);
pointer-events: none;
z-index: 199;
animation: flicker 10s infinite;
}

@keyframes flicker {
0%,89%,91%,93%,95%,100% { opacity:1; }
90%,92%,94% { opacity:0.88; }
}

/* BOOT */
#boot {
position: fixed; inset: 0;
padding: 14px;
font-size: clamp(12px, 3.5vw, 15px);
line-height: 1.65;
overflow-y: auto;
z-index: 10;
}

#boot-art {
color: var(–g);
text-shadow: 0 0 18px var(–g);
font-size: clamp(16px, 4.5vw, 28px);
margin-bottom: 14px;
white-space: pre;
animation: glow 3s ease-in-out infinite alternate;
}

@keyframes glow {
from { text-shadow: 0 0 10px var(–g); }
to   { text-shadow: 0 0 28px var(–g), 0 0 50px var(–gd); }
}

.bl   { display: block; opacity: 0; animation: fi 0.05s forwards; }
@keyframes fi { to { opacity:1; } }
.ok   { color: var(–g); }
.warn { color: var(–yl); }
.dim  { color: var(–gd); }
.cy   { color: var(–cy); }

/* TERMINAL */
#term {
position: fixed; inset: 0;
display: none;
flex-direction: column;
z-index: 10;
}

#tbar {
background: var(–gf);
border-bottom: 1px solid var(–gd);
padding: 7px 14px;
display: flex;
align-items: center;
gap: 8px;
flex-shrink: 0;
}

.dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; display:inline-block; }
.dr  { background:#ff5f57; }
.dy  { background:#febc2e; }
.dg  { background:#28c840; }

#ttitle {
flex:1; text-align:center;
font-size: clamp(9px, 2.5vw, 12px);
letter-spacing: 2px;
color: var(–g);
text-shadow: 0 0 8px var(–g);
}

#out {
flex:1;
overflow-y: auto;
padding: 14px 14px 6px;
font-size: clamp(12px, 3.5vw, 14px);
line-height: 1.75;
-webkit-overflow-scrolling: touch;
}

.ln { display:block; white-space:pre-wrap; word-break:break-word; }
.pl { color: var(–g); }
.rl { color: var(–gm); }
.ac { color: var(–cy); }
.yl { color: var(–yl); }
.mu { color: var(–gd); }
.er { color: #ff5555; }

/* BUTTON GRID */
#btns {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 6px;
padding: 8px 10px 12px;
border-top: 1px solid var(–gf);
flex-shrink: 0;
}

.cb {
background: var(–gf);
border: 1px solid var(–gd);
color: var(–g);
font-family: ‘Share Tech Mono’, ‘Courier New’, Courier, monospace;
font-size: clamp(10px, 3vw, 13px);
padding: 9px 4px;
border-radius: 4px;
cursor: pointer;
text-align: center;
-webkit-tap-highlight-color: transparent;
user-select: none;
transition: background 0.1s, box-shadow 0.1s;
}

.cb:active, .cb:focus { background: #003d10; box-shadow: 0 0 10px var(–gd); outline:none; }

.wide {
grid-column: span 3;
background: #0a1f0a;
border-color: var(–g);
color: var(–yl);
letter-spacing: 1px;
}

.wide:active { background: #1a3a1a; box-shadow: 0 0 18px var(–g); }
</style>

</head>
