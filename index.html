<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERSCHEK_B : OPERATIVE TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #33ff33;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            height: 100vh;
            overflow: hidden;
        }

        /* CRT Effects */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.4) 100%);
            z-index: 3;
            pointer-events: none;
        }

        .container {
            padding: 2rem;
            position: relative;
            z-index: 1;
            height: 100%;
            box-sizing: border-box;
            text-shadow: 0 0 5px #33ff33;
        }

        /* Boot Sequence */
        #boot-screen {
            white-space: pre-wrap;
        }

        /* Desktop Interface */
        #desktop {
            display: none;
        }

        .header {
            border-bottom: 2px solid #33ff33;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* Clickable Icons */
        .icon {
            border: 1px solid #33ff33;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(51, 255, 51, 0.05);
        }

        .icon:hover {
            background: #33ff33;
            color: #050505;
            box-shadow: 0 0 15px #33ff33;
        }

        .icon-art {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        /* Content Window */
        #content-window {
            display: none;
            border: 1px solid #33ff33;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.8);
            min-height: 200px;
        }

        .close-btn {
            float: right;
            cursor: pointer;
            color: #33ff33;
        }

        .close-btn:hover {
            color: #fff;
        }

        .blink {
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="crt">

<div class="container">
    <div id="boot-screen"><span id="boot-text"></span><span class="blink">_</span></div>

    <div id="desktop">
        <div class="header">
            <h1>BENJAMIN ADAM PERSCHEK</h1>

        </div>

        <div class="grid-container">
            <div class="icon" onclick="openFile('mission')">
                <div class="icon-art">[!]</div>
                <div>MISSION_BRIEF.EXE</div>
            </div>
            <div class="icon" onclick="openFile('career')">
                <div class="icon-art">[*]</div>
                <div>CAREER_LOG.TXT</div>
            </div>
            <div class="icon" onclick="openFile('training')">
                <div class="icon-art">[&]</div>
                <div>TRAINING_LOG.SYS</div>
            </div>
            <div class="icon" onclick="openFile('awards')">
                <div class="icon-art">[+]</div>
                <div>COMMENDATIONS.DAT</div>
            </div>
        </div>

        <div id="content-window">
            <div class="close-btn" onclick="closeFile()">[X] CLOSE</div>
            <h2 id="file-title"></h2>
            <div id="file-content"></div>
        </div>
        
        <p>C:\> <span class="blink">_</span></p>
    </div>
</div>

<script>
    // Resume Data Content
    const resumeData = {

        },

        },
        training: {
            title: "TRAINING & EDUCATION",
            [span_10](start_span)content: "<b>> WGU BS Cybersecurity & IA 2026</b>[span_10](end_span)[span_11](start_span)<br>Starting Summer 2026[span_11](end_span)<br><br><b>> Interior Electrician Course (721-12R10)</b><br>U.S. Army Engineer School, Ft. [span_12](start_span)Leonard Wood MO - 257 hrs[span_12](end_span)[span_13](start_span)<br><br><b>> Structured Self Development (SSD I)</b><br>SGM Academy Leadership & Task Management - 80 hrs[span_13](end_span)[span_14](start_span)<br><br><b>> Composite Risk Management Basic</b><br>Army Safety Center[span_14](end_span)"
        },
        awards: {
            title: "COMMENDATIONS",
            [span_15](start_span)content: "[+] Army Achievement Medal (2nd Award)[span_15](end_span)[span_16](start_span)<br>[+] Global War on Terrorism Service Medal[span_16](end_span)[span_17](start_span)<br>[+] Armed Forces Reserve Medal w/ M Device[span_17](end_span)[span_18](start_span)<br>[+] Global War on Terrorism Expeditionary Medal[span_18](end_span)[span_19](start_span)<br>[+] National Defense Service Medal[span_19](end_span)"
        }
    };

    // Boot Sequence Logic
    const bootLines = [
        [span_20](start_span)"operative file perschek_b: session_active[span_20](end_span)",
        "INITIALIZING BIOS...",
        "MEMORY CHECK: OK (640K RAM SYSTEM)",
        "MOUNTING DRIVE C: ...",
        "LOADING ENCRYPTION PROTOCOLS...",
        "ACCESS GRANTED.",
        [span_21](start_span)"$/load_operative-name= perschek-clearance general[span_21](end_span)",
        "LAUNCHING GUI..."
    ];

    let bootIndex = 0;
    const bootTextElement = document.getElementById('boot-text');
    const bootScreen = document.getElementById('boot-screen');
    const desktop = document.getElementById('desktop');

    function typeBootSequence() {
        if (bootIndex < bootLines.length) {
            bootTextElement.innerHTML += bootLines[bootIndex] + "<br>";
            bootIndex++;
            setTimeout(typeBootSequence, Math.random() * 300 + 200);
        } else {
            setTimeout(() => {
                bootScreen.style.display = 'none';
                desktop.style.display = 'block';
            }, 800);
        }
    }

    // Start boot sequence on load
    window.onload = typeBootSequence;

    // File Handling Logic
    function openFile(fileKey) {
        const windowEl = document.getElementById('content-window');
        const titleEl = document.getElementById('file-title');
        const contentEl = document.getElementById('file-content');
        
        titleEl.innerHTML = resumeData[fileKey].title;
        contentEl.innerHTML = resumeData[fileKey].content;
        windowEl.style.display = 'block';
    }

    function closeFile() {
        document.getElementById('content-window').style.display = 'none';
    }
</script>

</body>
</html>
