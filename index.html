<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–green: #00ff41;
–green-dim: #00bb30;
–green-faint: #003d0f;
–green-mid: #00cc33;
–bg: #010b01;
–scanline: rgba(0,0,0,0.15);
}

html, body {
width: 100%; height: 100%;
background: var(–bg);
color: var(–green);
font-family: ‘Share Tech Mono’, ‘Courier New’, Courier, monospace;
overflow: hidden;
cursor: auto;
}

@media (pointer: fine) {
html, body { cursor: none; }
}

#cursor {
position: fixed;
width: 18px; height: 18px;
border: 2px solid var(–green);
border-radius: 50%;
pointer-events: none;
z-index: 9999;
transform: translate(-50%, -50%);
transition: transform 0.05s;
mix-blend-mode: screen;
display: none;
}

@media (pointer: fine) {
#cursor { display: block; }
}
#cursor::after {
content: ‘’;
position: absolute;
width: 4px; height: 4px;
background: var(–green);
border-radius: 50%;
top: 50%; left: 50%;
transform: translate(-50%,-50%);
}

/* scanlines overlay */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background: repeating-linear-gradient(
to bottom,
transparent 0px,
transparent 3px,
var(–scanline) 3px,
var(–scanline) 4px
);
pointer-events: none;
z-index: 100;
}

/* CRT flicker */
body::after {
content: ‘’;
position: fixed;
inset: 0;
background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
pointer-events: none;
z-index: 99;
animation: flicker 8s infinite;
}

@keyframes flicker {
0%,100% { opacity: 1; }
92% { opacity: 1; }
93% { opacity: 0.85; }
94% { opacity: 1; }
96% { opacity: 0.9; }
97% { opacity: 1; }
}

/* BOOT SCREEN */
#boot {
position: fixed;
inset: 0;
padding: 16px 16px;
font-family: ‘Share Tech Mono’, ‘Courier New’, Courier, monospace;
font-size: clamp(11px, 3vw, 14px);
line-height: 1.6;
overflow-y: auto;
z-index: 10;
}

#boot-lines { white-space: pre; }

.boot-line { display: block; opacity: 0; animation: fadein 0.01s forwards; }
.ok    { color: var(–green); }
.warn  { color: #ffcc00; }
.err   { color: #ff4444; }
.dim   { color: var(–green-dim); }
.head  { color: #00ffff; font-size: 1.1em; }

@keyframes fadein { to { opacity: 1; } }

/* BIOS header art */
#bios-art {
font-family: ‘VT323’, monospace;
font-size: clamp(22px, 4vw, 42px);
color: var(–green);
text-shadow: 0 0 20px var(–green), 0 0 40px var(–green-dim);
margin-bottom: 12px;
letter-spacing: 2px;
}

/* TERMINAL */
#terminal {
position: fixed;
inset: 0;
display: none;
flex-direction: column;
padding: 0;
z-index: 10;
}

#term-header {
background: var(–green-faint);
border-bottom: 1px solid var(–green-dim);
padding: 6px 16px;
display: flex;
align-items: center;
gap: 12px;
font-size: 12px;
color: var(–green-dim);
flex-shrink: 0;
}

.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.dot-r { background: #ff5f57; }
.dot-y { background: #febc2e; }
.dot-g { background: #28c840; }

#term-title {
flex: 1;
text-align: center;
font-family: ‘Share Tech Mono’, monospace;
letter-spacing: 3px;
font-size: 11px;
color: var(–green);
text-shadow: 0 0 8px var(–green);
}

#output-area {
flex: 1;
overflow-y: auto;
padding: 20px 24px 8px;
font-size: clamp(12px, 1.6vw, 14px);
line-height: 1.7;
scrollbar-width: thin;
scrollbar-color: var(–green-dim) transparent;
}

#output-area::-webkit-scrollbar { width: 6px; }
#output-area::-webkit-scrollbar-thumb { background: var(–green-dim); border-radius: 3px; }

.out-line { display: block; white-space: pre-wrap; word-break: break-word; }
.prompt-line { color: var(–green); }
.result-line { color: var(–green-mid); }
.accent { color: #00ffff; }
.yellow { color: #ffdd57; }
.muted  { color: var(–green-dim); }
.error  { color: #ff5555; }
.big    { font-family: ‘VT323’, monospace; font-size: 2em; color: var(–green); text-shadow: 0 0 10px var(–green); line-height: 1.2; }

#input-row {
display: flex;
align-items: center;
padding: 10px 24px 16px;
border-top: 1px solid var(–green-faint);
gap: 8px;
flex-shrink: 0;
}

#prompt-label {
color: var(–green);
text-shadow: 0 0 8px var(–green);
white-space: nowrap;
font-size: clamp(12px, 1.6vw, 14px);
flex-shrink: 0;
}

#cmd-input {
flex: 1;
background: transparent;
border: none;
outline: none;
color: var(–green);
font-family: ‘Share Tech Mono’, monospace;
font-size: clamp(12px, 1.6vw, 14px);
caret-color: var(–green);
text-shadow: 0 0 6px var(–green);
}

/* glitch animation for banner */
@keyframes glitch {
0%,100% { text-shadow: 0 0 20px var(–green), 0 0 40px var(–green-dim); transform: none; }
20% { text-shadow: -2px 0 #ff0000, 2px 0 #00ffff; transform: translateX(1px); }
21% { text-shadow: 0 0 20px var(–green); transform: none; }
60% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ff00; transform: translateX(-1px); }
61% { text-shadow: 0 0 20px var(–green); transform: none; }
}

.glitch { animation: glitch 6s infinite; display: inline-block; }

/* help table */
.cmd-table { border-collapse: collapse; margin: 4px 0 8px; width: 100%; max-width: 560px; }
.cmd-table td { padding: 1px 16px 1px 0; vertical-align: top; }
.cmd-table td:first-child { color: #00ffff; white-space: nowrap; min-width: 120px; }
.cmd-table td:last-child { color: var(–green-mid); }

// unknown command fallback
function runCommand(raw) {
  const cmd = raw.trim().toLowerCase();
  if (!cmd) return;

  history.unshift(raw);
  histIdx = -1;

  println(`<span class="accent">ben@localhost:~$</span> ${escHtml(raw)}`, 'prompt-line');

  if (COMMANDS[cmd]) {
    COMMANDS[cmd]();
  } else {
    println(`<span class="error">bash: ${escHtml(cmd)}: command not found</span>`);
    println(`<span class="muted">Type <span style="color:var(--green)">help</span> to see available commands.</span>`);
    println(``);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// input handling
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const v = inp.value;
    inp.value = '';
    runCommand(v);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) { histIdx++; inp.value = history[histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; inp.value = history[histIdx]; }
    else { histIdx = -1; inp.value = ''; }
  }
});

// keep focus
document.addEventListener('click', () => inp.focus());
